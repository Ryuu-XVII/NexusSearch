version: "3.8"

services:
  db:
    image: postgres:15
    container_name: nexus_postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexuspassword
      POSTGRES_DB: nexus_search
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: nexus_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./backend
    container_name: nexus_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nexus:nexuspassword@db:5432/nexus_search
      - QDRANT_URL=qdrant
    depends_on:
      - db
      - redis
      - qdrant

volumes:
  postgres_data:
  qdrant_data:
